name: Garden Codes

on:
  schedule:
    # Temporary test: 13:00 UTC is 21:00 in Asia/Shanghai.
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Collect codes and push to ServerChan
        env:
          SERVERCHAN_SEND_URL: ${{ secrets.SERVERCHAN_SEND_URL }}
          SERVERCHAN_SEND_URL_2: ${{ secrets.SERVERCHAN_SEND_URL_2 }}
        run: python scripts/collect_garden_codes.py
