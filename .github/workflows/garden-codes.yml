name: Garden Codes

on:
  schedule:
    # Beijing 20:00/20:05/20:10, 21:00/21:05/21:10, 22:00/22:05/22:10.
    - cron: "0,5,10 12,13,14 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Manual test slot: 20, 21, or 22"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  collect-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Collect codes and push to ServerChan
        env:
          SERVERCHAN_SEND_URL: ${{ secrets.SERVERCHAN_SEND_URL }}
          SERVERCHAN_SEND_URL_2: ${{ secrets.SERVERCHAN_SEND_URL_2 }}
          GARDEN_SLOT: ${{ github.event.inputs.slot }}
        run: python scripts/collect_garden_codes.py

      - name: Persist sent state
        run: |
          if [ -n "$(git status --porcelain .github/state/garden-sent.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/state/garden-sent.json
            git commit -m "Update garden push state"
            git push
          else
            echo "No sent state change."
          fi
