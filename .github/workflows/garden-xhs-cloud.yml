name: Garden XHS Cloud Codes

on:
  schedule:
    # Backup timers. Primary timers can still call workflow_dispatch from an external cron service.
    # GitHub schedules use UTC; comments show Beijing time.
    - cron: "7 12 * * *"  # 20:07 slot=20 attempt=1
    - cron: "12 12 * * *" # 20:12 slot=20 attempt=2
    - cron: "17 12 * * *" # 20:17 slot=20 attempt=3
    - cron: "25 13 * * *" # 21:25 slot=21 attempt=1
    - cron: "30 13 * * *" # 21:30 slot=21 attempt=2
    - cron: "35 13 * * *" # 21:35 slot=21 attempt=3
    - cron: "5 14 * * *"  # 22:05 slot=22 attempt=1
    - cron: "10 14 * * *" # 22:10 slot=22 attempt=2
    - cron: "15 14 * * *" # 22:15 slot=22 attempt=3
  workflow_dispatch:
    inputs:
      slot:
        description: "Manual test slot hour: 20, 21, or 22"
        required: true
        default: "20"
      attempt:
        description: "Manual test attempt: 1, 2, or 3"
        required: true
        default: "1"
      date:
        description: "Manual test Beijing date, YYYY-MM-DD. Empty means today."
        required: false
        default: ""
      dry_run:
        description: "Manual test only: true avoids pushing and state commits"
        required: true
        default: "true"

permissions:
  contents: write

concurrency:
  group: garden-xhs-cloud
  cancel-in-progress: false

jobs:
  collect-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: Asia/Shanghai
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      GARDEN_RUN_SOURCE: "云端 GitHub"
      XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
      SERVERCHAN_SEND_URL: ${{ secrets.SERVERCHAN_SEND_URL }}
      SERVERCHAN_SEND_URL_2: ${{ secrets.SERVERCHAN_SEND_URL_2 }}
      GARDEN_SKIP_EMPTY_PUSH: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest sent state
        shell: bash
        run: git pull --rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache aione upstreams
        uses: actions/cache@v4
        with:
          path: ~/.local/share/aione
          key: aione-upstreams-v1

      - name: Install aione
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install all-in-one-aione platformdirs
          aione setup

      - name: Save XHS cookie
        shell: bash
        run: |
          if [[ -z "$XHS_COOKIE" ]]; then
            echo "Missing XHS_COOKIE secret"
            exit 1
          fi
          clean_cookie="$(python -c 'import os; print((os.environ.get("XHS_COOKIE") or "").lstrip("\ufeff").strip())')"
          aione auth xhs set-cookie --profile pc --cookie "$clean_cookie"

      - name: Collect and push
        shell: bash
        run: |
          set -euo pipefail

          run_one() {
            local slot="$1"
            local attempt="$2"
            local date_arg="$3"
            shift 3
            python scripts/push_xhs_garden_codes.py \
              --slot "$slot" \
              --attempt "$attempt" \
              --date "$date_arg" \
              "$@"
          }

          slot=""
          attempt=""
          dry_run="false"
          date_arg="$(date +%F)"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            slot="${{ inputs.slot }}"
            attempt="${{ inputs.attempt }}"
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              dry_run="true"
            fi
            if [[ -n "${{ inputs.date }}" ]]; then
              date_arg="${{ inputs.date }}"
            fi
          else
            case "${{ github.event.schedule }}" in
              "7 12 * * *") slot="20"; attempt="1" ;;
              "12 12 * * *") slot="20"; attempt="2" ;;
              "17 12 * * *") slot="20"; attempt="3" ;;
              "25 13 * * *") slot="21"; attempt="1" ;;
              "30 13 * * *") slot="21"; attempt="2" ;;
              "35 13 * * *") slot="21"; attempt="3" ;;
              "5 14 * * *") slot="22"; attempt="1" ;;
              "10 14 * * *") slot="22"; attempt="2" ;;
              "15 14 * * *") slot="22"; attempt="3" ;;
              *)
                echo "Unknown schedule: ${{ github.event.schedule }}"
                exit 1
                ;;
            esac
          fi

          extra_args=()
          if [[ "$dry_run" == "true" ]]; then
            extra_args+=(--dry-run)
          fi

          echo "Running source=$GARDEN_RUN_SOURCE slot=$slot attempt=$attempt date=$date_arg dry_run=$dry_run at $(date '+%F %T')"
          run_one "$slot" "$attempt" "$date_arg" "${extra_args[@]}"

      - name: Commit sent state
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true' }}
        shell: bash
        run: |
          if [[ -n "$(git status --short .garden_code_state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .garden_code_state.json
            git commit -m "Update garden code sent state"
            git push
          else
            echo "No sent state changes."
          fi
