name: Garden XHS Cloud Codes

on:
  schedule:
    # Start once at Beijing 20:15, then the job waits locally for 20:20/20:25/20:30,
    # 21:20/21:25/21:30, and 22:20/22:25/22:30.
    - cron: "15 12 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Manual test slot hour: 20, 21, or 22"
        required: true
        default: "20"
      attempt:
        description: "Manual test attempt: 1, 2, or 3"
        required: true
        default: "1"
      date:
        description: "Manual test Beijing date, YYYY-MM-DD. Empty means today."
        required: false
        default: ""
      dry_run:
        description: "Manual test only: true avoids pushing and state commits"
        required: true
        default: "true"

permissions:
  contents: write

concurrency:
  group: garden-xhs-cloud
  cancel-in-progress: false

jobs:
  collect-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      TZ: Asia/Shanghai
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
      SERVERCHAN_SEND_URL: ${{ secrets.SERVERCHAN_SEND_URL }}
      SERVERCHAN_SEND_URL_2: ${{ secrets.SERVERCHAN_SEND_URL_2 }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache aione upstreams
        uses: actions/cache@v4
        with:
          path: ~/.local/share/aione
          key: aione-upstreams-v1

      - name: Install aione
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install all-in-one-aione
          aione setup

      - name: Save XHS cookie
        shell: bash
        run: |
          if [[ -z "$XHS_COOKIE" ]]; then
            echo "Missing XHS_COOKIE secret"
            exit 1
          fi
          aione auth xhs set-cookie --profile pc --cookie "$XHS_COOKIE"

      - name: Collect and push
        shell: bash
        run: |
          set -euo pipefail

          run_one() {
            local slot="$1"
            local attempt="$2"
            local date_arg="$3"
            shift 3
            python scripts/push_xhs_garden_codes.py \
              --slot "$slot" \
              --attempt "$attempt" \
              --date "$date_arg" \
              "$@"
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            extra_args=()
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              extra_args+=(--dry-run)
            fi
            date_arg="${{ inputs.date }}"
            if [[ -z "$date_arg" ]]; then
              date_arg="$(date +%F)"
            fi
            run_one "${{ inputs.slot }}" "${{ inputs.attempt }}" "$date_arg" "${extra_args[@]}"
            exit 0
          fi

          now_hm="$(date +%H%M)"
          if (( 10#$now_hm >= 2330 || 10#$now_hm < 1900 )); then
            echo "Scheduled run is stale at Beijing $(date '+%F %T'); skip push."
            exit 0
          fi

          date_arg="$(date +%F)"
          wait_until() {
            local target="$1"
            while true; do
              local now epoch_target epoch_now sleep_seconds
              now="$(date +%H:%M)"
              epoch_now="$(date +%s)"
              epoch_target="$(date -d "$(date +%F) $target:00" +%s)"
              sleep_seconds=$(( epoch_target - epoch_now ))
              if (( sleep_seconds <= 0 )); then
                echo "Running target $target at Beijing $(date '+%F %T')"
                return
              fi
              echo "Waiting ${sleep_seconds}s for Beijing $target; now $now"
              sleep "$sleep_seconds"
            done
          }

          wait_until "20:20"; run_one 20 1 "$date_arg"
          wait_until "20:25"; run_one 20 2 "$date_arg"
          wait_until "20:30"; run_one 20 3 "$date_arg"
          wait_until "21:20"; run_one 21 1 "$date_arg"
          wait_until "21:25"; run_one 21 2 "$date_arg"
          wait_until "21:30"; run_one 21 3 "$date_arg"
          wait_until "22:20"; run_one 22 1 "$date_arg"
          wait_until "22:25"; run_one 22 2 "$date_arg"
          wait_until "22:30"; run_one 22 3 "$date_arg"

      - name: Commit sent state
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true' }}
        shell: bash
        run: |
          if [[ -n "$(git status --short .garden_code_state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .garden_code_state.json
            git commit -m "Update garden code sent state"
            git pull --rebase
            git push
          else
            echo "No sent state changes."
          fi
