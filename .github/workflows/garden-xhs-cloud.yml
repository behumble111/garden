name: Garden XHS Cloud Codes

on:
  schedule:
    # Beijing 20:15-22:55. Runs outside active windows exit without pushing.
    - cron: "*/5 12-14 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Manual test slot hour: 20, 21, or 22"
        required: true
        default: "20"
      attempt:
        description: "Manual test attempt: 1, 2, or 3"
        required: true
        default: "1"
      date:
        description: "Manual test Beijing date, YYYY-MM-DD. Empty means today."
        required: false
        default: ""
      dry_run:
        description: "Manual test only: true avoids pushing and state commits"
        required: true
        default: "true"

permissions:
  contents: write

concurrency:
  group: garden-xhs-cloud
  cancel-in-progress: false

jobs:
  collect-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Shanghai
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
      SERVERCHAN_SEND_URL: ${{ secrets.SERVERCHAN_SEND_URL }}
      SERVERCHAN_SEND_URL_2: ${{ secrets.SERVERCHAN_SEND_URL_2 }}
      GARDEN_SKIP_EMPTY_PUSH: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache aione upstreams
        uses: actions/cache@v4
        with:
          path: ~/.local/share/aione
          key: aione-upstreams-v1

      - name: Install aione
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install all-in-one-aione
          aione setup

      - name: Save XHS cookie
        shell: bash
        run: |
          if [[ -z "$XHS_COOKIE" ]]; then
            echo "Missing XHS_COOKIE secret"
            exit 1
          fi
          aione auth xhs set-cookie --profile pc --cookie "$XHS_COOKIE"

      - name: Collect and push
        shell: bash
        run: |
          set -euo pipefail

          run_one() {
            local slot="$1"
            local attempt="$2"
            local date_arg="$3"
            shift 3
            python scripts/push_xhs_garden_codes.py \
              --slot "$slot" \
              --attempt "$attempt" \
              --date "$date_arg" \
              "$@"
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            extra_args=()
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              extra_args+=(--dry-run)
            fi
            date_arg="${{ inputs.date }}"
            if [[ -z "$date_arg" ]]; then
              date_arg="$(date +%F)"
            fi
            run_one "${{ inputs.slot }}" "${{ inputs.attempt }}" "$date_arg" "${extra_args[@]}"
            exit 0
          fi

          now_h="$(date +%H)"
          now_m="$(date +%M)"
          now_hm="${now_h}${now_m}"
          date_arg="$(date +%F)"
          slot=""
          attempt=""

          if (( 10#$now_hm >= 2020 && 10#$now_hm < 2025 )); then
            slot=20; attempt=1
          elif (( 10#$now_hm >= 2025 && 10#$now_hm < 2030 )); then
            slot=20; attempt=2
          elif (( 10#$now_hm >= 2030 && 10#$now_hm < 2035 )); then
            slot=20; attempt=3
          elif (( 10#$now_hm >= 2120 && 10#$now_hm < 2125 )); then
            slot=21; attempt=1
          elif (( 10#$now_hm >= 2125 && 10#$now_hm < 2130 )); then
            slot=21; attempt=2
          elif (( 10#$now_hm >= 2130 && 10#$now_hm < 2135 )); then
            slot=21; attempt=3
          elif (( 10#$now_hm >= 2220 && 10#$now_hm < 2225 )); then
            slot=22; attempt=1
          elif (( 10#$now_hm >= 2225 && 10#$now_hm < 2230 )); then
            slot=22; attempt=2
          elif (( 10#$now_hm >= 2230 && 10#$now_hm < 2235 )); then
            slot=22; attempt=3
          else
            echo "No active Beijing window at $(date '+%F %T'); skip push."
            exit 0
          fi

          echo "Running slot=$slot attempt=$attempt for Beijing $date_arg at $(date '+%F %T')"
          run_one "$slot" "$attempt" "$date_arg"

      - name: Commit sent state
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true' }}
        shell: bash
        run: |
          if [[ -n "$(git status --short .garden_code_state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .garden_code_state.json
            git commit -m "Update garden code sent state"
            git pull --rebase
            git push
          else
            echo "No sent state changes."
          fi
