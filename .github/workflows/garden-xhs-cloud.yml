name: Garden XHS Cloud Codes

on:
  schedule:
    # Beijing 20:05. One runner waits for all evening checkpoints.
    - cron: "5 12 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Manual test slot hour: 20, 21, or 22"
        required: true
        default: "20"
      attempt:
        description: "Manual test attempt: 1, 2, or 3"
        required: true
        default: "1"
      date:
        description: "Manual test Beijing date, YYYY-MM-DD. Empty means today."
        required: false
        default: ""
      dry_run:
        description: "Manual test only: true avoids pushing and state commits"
        required: true
        default: "true"

permissions:
  contents: write

concurrency:
  group: garden-xhs-cloud
  cancel-in-progress: false

jobs:
  collect-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 220
    env:
      TZ: Asia/Shanghai
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
      SERVERCHAN_SEND_URL: ${{ secrets.SERVERCHAN_SEND_URL }}
      SERVERCHAN_SEND_URL_2: ${{ secrets.SERVERCHAN_SEND_URL_2 }}
      GARDEN_SKIP_EMPTY_PUSH: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache aione upstreams
        uses: actions/cache@v4
        with:
          path: ~/.local/share/aione
          key: aione-upstreams-v1

      - name: Install aione
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install all-in-one-aione
          aione setup

      - name: Save XHS cookie
        shell: bash
        run: |
          if [[ -z "$XHS_COOKIE" ]]; then
            echo "Missing XHS_COOKIE secret"
            exit 1
          fi
          aione auth xhs set-cookie --profile pc --cookie "$XHS_COOKIE"

      - name: Collect and push
        shell: bash
        run: |
          set -euo pipefail

          run_one() {
            local slot="$1"
            local attempt="$2"
            local date_arg="$3"
            shift 3
            python scripts/push_xhs_garden_codes.py \
              --slot "$slot" \
              --attempt "$attempt" \
              --date "$date_arg" \
              "$@"
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            extra_args=()
            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              extra_args+=(--dry-run)
            fi
            date_arg="${{ inputs.date }}"
            if [[ -z "$date_arg" ]]; then
              date_arg="$(date +%F)"
            fi
            run_one "${{ inputs.slot }}" "${{ inputs.attempt }}" "$date_arg" "${extra_args[@]}"
            exit 0
          fi

          date_arg="$(date +%F)"

          start_hm="$(date +%H%M)"
          if (( 10#$start_hm < 1900 || 10#$start_hm >= 2330 )); then
            echo "Stale schedule start at $(date '+%F %T'); skip push."
            exit 0
          fi

          run_checkpoint() {
            local slot="$1"
            local attempt="$2"
            local target_time="$3"
            local cutoff_time="$4"
            local target_epoch
            local cutoff_epoch
            local now_epoch

            target_epoch="$(date -d "$date_arg $target_time:00" +%s)"
            cutoff_epoch="$(date -d "$date_arg $cutoff_time:00" +%s)"
            now_epoch="$(date +%s)"

            if (( now_epoch < target_epoch )); then
              echo "Waiting for slot=$slot attempt=$attempt at $date_arg $target_time"
              sleep "$(( target_epoch - now_epoch ))"
            fi

            now_epoch="$(date +%s)"
            if (( now_epoch >= cutoff_epoch )); then
              echo "Skip slot=$slot attempt=$attempt; past cutoff $cutoff_time."
              return 0
            fi

            if (( attempt < 3 && now_epoch > target_epoch + 120 )); then
              echo "Skip stale slot=$slot attempt=$attempt; next attempt will cover it."
              return 0
            fi

            echo "Running slot=$slot attempt=$attempt for Beijing $date_arg at $(date '+%F %T')"
            run_one "$slot" "$attempt" "$date_arg"
          }

          run_checkpoint 20 1 20:10 21:10
          run_checkpoint 20 2 20:15 21:10
          run_checkpoint 20 3 20:20 21:10
          run_checkpoint 21 1 21:10 22:10
          run_checkpoint 21 2 21:15 22:10
          run_checkpoint 21 3 21:20 22:10
          run_checkpoint 22 1 22:10 23:30
          run_checkpoint 22 2 22:15 23:30
          run_checkpoint 22 3 22:20 23:30

      - name: Commit sent state
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true' }}
        shell: bash
        run: |
          if [[ -n "$(git status --short .garden_code_state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .garden_code_state.json
            git commit -m "Update garden code sent state"
            git pull --rebase
            git push
          else
            echo "No sent state changes."
          fi
