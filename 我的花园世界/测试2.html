<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>花园世界 · 花卉查询图鉴</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft YaHei",sans-serif;
}

body{
    background:linear-gradient(180deg,#f5f3ff,#ede9fe);
    min-height:100vh;
    color:#333;
}

header{
    background:linear-gradient(135deg,#7c3aed,#a855f7);
    color:white;
    padding:35px 20px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,.15);
}

header h1{
    font-size:36px;
    margin-bottom:10px;
}

header p{
    opacity:.9;
}

.container{
    width:92%;
    max-width:1300px;
    margin:40px auto;
}

.query-box{
    background:white;
    border-radius:24px;
    padding:30px;
    box-shadow:0 8px 24px rgba(0,0,0,.08);
    margin-bottom:30px;
}

.query-title{
    font-size:24px;
    margin-bottom:25px;
    color:#6d28d9;
    font-weight:bold;
}

.query-row{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

select{
    flex:1;
    min-width:240px;
    padding:16px;
    border:none;
    border-radius:16px;
    background:#f5f3ff;
    font-size:16px;
    outline:none;
}

button{
    padding:16px 28px;
    border:none;
    border-radius:16px;
    background:#7c3aed;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.2s;
    font-weight:bold;
}

button:hover{
    background:#6d28d9;
    transform:translateY(-2px);
}

.player-card{
    background:white;
    border-radius:28px;
    padding:30px;
    box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.player-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:30px;
}

.player-name{
    font-size:34px;
    font-weight:bold;
    color:#6d28d9;
}

.player-count{
    background:#ede9fe;
    color:#6d28d9;
    padding:10px 18px;
    border-radius:999px;
    font-weight:bold;
}

.rarity-title{
    margin:30px 0 18px;
    font-size:24px;
    font-weight:bold;
}

.gold-text{
    color:#ca8a04;
}

.purple-text{
    color:#7e22ce;
}

.flower-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
    gap:20px;
}

.flower-card{
    background:#faf7ff;
    border-radius:22px;
    overflow:hidden;
    transition:.25s;
    border:2px solid #ede9fe;
}

.flower-card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(0,0,0,.12);
}

.flower-card img{
    width:100%;
    height:200px;
    object-fit:cover;
    background:#eee;
}

.flower-info{
    padding:16px;
    text-align:center;
}

.flower-name{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

.tag{
    display:inline-block;
    padding:6px 14px;
    border-radius:999px;
    font-size:13px;
    color:white;
    font-weight:bold;
}

.gold{
    background:linear-gradient(135deg,#facc15,#ca8a04);
}

.purple{
    background:linear-gradient(135deg,#a855f7,#7e22ce);
}

.empty{
    text-align:center;
    color:#777;
    padding:80px;
    font-size:22px;
}

footer{
    text-align:center;
    color:#777;
    padding:35px;
}

@media(max-width:700px){

    .player-name{
        font-size:28px;
    }

    .flower-grid{
        grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    }

}

</style>
</head>

<body>

<header>
    <h1>🌸 花园世界 · 花卉图鉴</h1>
    <p>查询玩家拥有的珍贵花卉，避免误删</p>
</header>

<div class="container">

    <div class="query-box">

        <div class="query-title">
            🔍 查询玩家花卉
        </div>

        <div class="query-row">

            <select id="playerSelect">
                <option value="">请选择玩家ID</option>
                <option value="香瓜子">香瓜子</option>
                <option value="西瓜子">西瓜子</option>
            </select>

            <button onclick="queryPlayer()">
                查询图鉴
            </button>

        </div>

    </div>

    <div id="resultArea">

        <div class="empty">
            请选择玩家后进行查询
        </div>

    </div>

</div>

<footer>
    花园世界图鉴系统 · 公会专用
</footer>

<script>

const players = {

    "香瓜子":{

        gold:[],

        purple:[
            {
                name:"冰蓝矮牵牛",
                image:"images/冰蓝矮牵牛.jpg"
            },
            {
                name:"粉红木槿花",
                image:"images/粉红木槿花.jpg"
            },
            {
                name:"毛蕊紫银莲",
                image:"images/毛蕊紫银莲.jpg"
            },
            {
                name:"泼墨",
                image:"images/泼墨.jpg"
            },
            {
                name:"青山银桂",
                image:"images/青山银桂.jpg"
            }
        ]
    },

    "西瓜子":{

        gold:[
            {
                name:"落英浮香",
                image:"images/落英浮香.jpg"
            }
        ],

        purple:[
            {
                name:"冰蓝矮牵牛",
                image:"images/冰蓝矮牵牛.jpg"
            },
            {
                name:"粉樱月见草",
                image:"images/粉樱月见草.jpg"
            },
            {
                name:"香槟玫瑰",
                image:"images/香槟玫瑰.jpg"
            },
            {
                name:"伯利恒之星",
                image:"images/伯利恒之星.jpg"
            },
            {
                name:"鸳鸯茉莉",
                image:"images/鸳鸯茉莉.jpg"
            },
            {
                name:"褐红铁筷花",
                image:"images/褐红铁筷花.jpg"
            },
            {
                name:"雾粉麦冬花",
                image:"images/雾粉麦冬花.jpg"
            },
            {
                name:"甜橙美女樱",
                image:"images/甜橙美女樱.jpg"
            }
        ]
    }

};

function createFlowerHTML(flower,type){

    return `
        <div class="flower-card">

            <img src="${flower.image}" alt="${flower.name}">

            <div class="flower-info">

                <div class="flower-name">
                    ${flower.name}
                </div>

                <span class="tag ${type}">
                    ${type === "gold" ? "华丽（金色）" : "珍贵（紫色）"}
                </span>

            </div>

        </div>
    `;
}

function queryPlayer(){

    const id = document.getElementById("playerSelect").value;

    const area = document.getElementById("resultArea");

    if(!id){

        area.innerHTML = `
            <div class="empty">
                请选择玩家
            </div>
        `;

        return;
    }

    const data = players[id];

    const total =
        data.gold.length
        + data.purple.length;

    let goldHTML = "";
    let purpleHTML = "";

    data.gold.forEach(flower=>{
        goldHTML += createFlowerHTML(flower,"gold");
    });

    data.purple.forEach(flower=>{
        purpleHTML += createFlowerHTML(flower,"purple");
    });

    area.innerHTML = `
        <div class="player-card">

            <div class="player-header">

                <div class="player-name">
                    ${id}
                </div>

                <div class="player-count">
                    共 ${total} 种珍贵花卉
                </div>

            </div>

            ${
                data.gold.length > 0
                ?
                `
                <div class="rarity-title gold-text">
                    ✨ 华丽（金色）
                </div>

                <div class="flower-grid">
                    ${goldHTML}
                </div>
                `
                :
                ""
            }

            ${
                data.purple.length > 0
                ?
                `
                <div class="rarity-title purple-text">
                    💜 珍贵（紫色）
                </div>

                <div class="flower-grid">
                    ${purpleHTML}
                </div>
                `
                :
                ""
            }

        </div>
    `;
}

</script>

</body>
</html>
